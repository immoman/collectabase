version: '3.8'

services:
  collectabase:
    build: .
    container_name: collectabase
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Map the local data directory for persistent SQLite database
      - ./data:/app/data
      # Map the local uploads directory for persistent cover images
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/games.db
      - UPLOADS_DIR=/app/uploads
      - TZ=Europe/Berlin
      
      # Optional: Uncomment and populate these if you want to set them system-wide instead of via the UI
      # - IGDB_CLIENT_ID=
      # - IGDB_CLIENT_SECRET=
      # - EBAY_CLIENT_ID=
      # - EBAY_CLIENT_SECRET=
      # - RAWG_API_KEY=
      # - ADMIN_API_KEY=
